providers = ["python"]

[phases.setup]
# 🚨 CRITICAL FIX: The "..." item ensures Python is preserved and doesn't get wiped out!
nixPkgs = ["...", "python3", "stockfish", "fairy-stockfish"]

[phases.build]
cmds = [
  "pip install -r requirements.txt",
  # 🛠️ Now that paths are preserved, this successfully copies the binaries locally!
  "cp $(which stockfish) ./stockfish",
  "cp $(which fairy-stockfish) ./fairy-stockfish",
  "chmod +x ./stockfish ./fairy-stockfish"
]

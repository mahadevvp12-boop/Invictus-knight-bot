providers = ["python"]

[phases.setup]
# 📦 Still using the safe, native Nix packages
nixPkgs = ["python3", "stockfish", "fairy-stockfish"]

[phases.build]
cmds = [
  "pip install -r requirements.txt",
  # 🛠️ CRITICAL FIX: Locates the isolated Nix binary and copies it locally so Python can see it
  "cp $(which stockfish) ./stockfish",
  "cp $(which fairy-stockfish) ./fairy-stockfish",
  # 🔑 Grant full execute authorizations just to be safe
  "chmod +x ./stockfish ./fairy-stockfish"
]
